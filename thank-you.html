<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Syed Shahrukh Ahmed</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .thank-you-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        .success-icon {
            font-size: 5rem;
            color: var(--accent);
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px rgba(225, 29, 72, 0.3));
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .thank-you-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 50px 40px;
            border-radius: 24px;
            max-width: 600px;
            width: 100%;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .thank-you-card h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            background: linear-gradient(to right, #ffffff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .thank-you-card p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 35px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .redirect-note {
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="thank-you-section">
        <div class="thank-you-card">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>Message Sent!</h1>
            <p>Thank you for reaching out, Syed Shahrukh Ahmed has received your message. I'll get back to you as soon as possible via the email address you provided.</p>
            
            <a href="index.html" class="btn btn-primary">
                <i class="fas fa-arrow-left" style="margin-right: 10px;"></i> Back to Portfolio
            </a>

            <div class="redirect-note">
                <p>Or visit my <a href="https://github.com/shahrukhahmed125" target="_blank" style="color: var(--accent); font-weight: 600;">GitHub</a> for more projects.</p>
            </div>
        </div>
    </div>
</body>
</html>
